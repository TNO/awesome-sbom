{{ define "main" }}
<div class="container">
  <article>
    <header class="article-header">
      <h1 class="article-title">{{ .Title }}</h1>
    </header>
    <div class="article-body">
      {{ .Content }}
    </div>
    <nav class="article-nav">
      {{ with .PrevInSection }}
      <a href="{{ .Permalink }}">← {{ .Title }}</a>
      {{ else }}<span></span>{{ end }}
      {{ with .NextInSection }}
      <a href="{{ .Permalink }}">{{ .Title }} →</a>
      {{ else }}<span></span>{{ end }}
    </nav>
  </article>
</div>
{{ end }}
