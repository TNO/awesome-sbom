<header class="site-header">
    <nav>
        <div class="nav-left">
            <a href="{{ .Site.Home.Permalink }}" class="nav-home">
                <img src="{{ .Site.Params.logo | absURL }}" alt="TNO logo" class="site-logo logo-light" width="110" height="32">
                <img src="{{ "images/logo-dark.webp" | absURL }}" alt="TNO logo" class="site-logo logo-dark" width="110" height="32">
                <span class="site-name">{{ .Site.Title }}</span>
            </a>
        </div>

        <div class="nav-links">
            {{ range .Site.Menus.main }}
            {{ $isActive := eq $.RelPermalink (.URL | relLangURL) }}
            <a href="{{ .URL | absLangURL }}" class="nav-link{{ if $isActive }} nav-link--active{{ end }}">{{ .Name }}</a>
            {{ end }}
        </div>

        <div class="header-controls">
            <button class="theme-toggle" title="Toggle dark mode">Dark / Light</button>
        </div>
    </nav>
</header>
